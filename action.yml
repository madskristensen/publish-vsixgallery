name: "Publish to Open VSIX Gallery"
description: "Uploads a VSIX extension to the Open VSIX Gallery (vsixgallery.com)"

branding:
  icon: 'arrow-up-circle'
  color: 'purple'

inputs:
  vsix-file:
    description: "Path to the .vsix file to upload"
    required: true
  readme:
    description: "URL to a README.md. Defaults to <branch>/README.md in the current repo"
    required: false
  manage-token:
    description: |
      Optional manage token. Acts as a password for the extension's
      /extension/<id>/manage page (delete, etc.). When omitted, the gallery
      auto-generates a token on first upload and embeds it in the manage URL
      shown in the workflow run summary -- save it from there. When supplied,
      the manage URL in the summary will not contain the token; you'll be
      prompted for it on the manage page.
    required: false

runs:
  using: "composite"
  steps:
    - name: Upload to Open VSIX Gallery
      shell: bash
      env:
        VSIX_FILE: ${{ inputs.vsix-file }}
        README_URL: ${{ inputs.readme }}
        MANAGE_TOKEN: ${{ inputs.manage-token }}
      run: |
        if [ ! -f "$VSIX_FILE" ]; then
          echo "::error::VSIX file not found: $VSIX_FILE"
          exit 1
        fi

        repo="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/"
        readme="${README_URL:-${GITHUB_REF_NAME}/README.md}"

        # Force UTF-8 for all Python invocations so emoji / em-dash in the
        # summary don't blow up on Windows runners where stdout defaults to
        # cp1252 (UnicodeEncodeError on '\u2705', '\u2014', etc.).
        export PYTHONIOENCODING=utf-8
        export PYTHONUTF8=1

        encode() { python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"; }

        url="https://www.vsixgallery.com/api/upload?repo=$(encode "$repo")&issuetracker=$(encode "${repo}issues/")&readmeUrl=$(encode "$readme")"

        # Build curl args. Always mask the manage token in logs (whether the
        # publisher supplied one or the server generated one and returned it
        # in the manage URL).
        curl_args=(--silent --show-error --fail-with-body -F "file=@${VSIX_FILE}")

        if [ -n "$MANAGE_TOKEN" ]; then
          echo "::add-mask::$MANAGE_TOKEN"
          curl_args+=(-H "X-Manage-Token: $MANAGE_TOKEN")
        fi

        echo "Uploading $VSIX_FILE..."
        if ! result=$(curl "${curl_args[@]}" "$url" 2>&1); then
          echo "::error::Upload failed: $result"
          exit 1
        fi
        echo "Upload successful"

        # Best-effort run summary. We write to $GITHUB_STEP_SUMMARY directly
        # using an explicit UTF-8 file handle (don't go through stdout) and
        # never let a summary failure fail the step.
        if command -v python3 >/dev/null 2>&1 && [ -n "$GITHUB_STEP_SUMMARY" ]; then
          RESULT_JSON="$result" SUMMARY_PATH="$GITHUB_STEP_SUMMARY" python3 <<'PY' || true
        import json
        import os
        import urllib.parse

        raw = os.environ.get("RESULT_JSON", "")
        path = os.environ.get("SUMMARY_PATH", "")
        if not raw or not path:
            raise SystemExit(0)

        try:
            data = json.loads(raw)
        except Exception:
            raise SystemExit(0)

        ext_id = data.get("ID") or data.get("id") or ""
        name = data.get("Name") or data.get("name") or ext_id
        version = data.get("Version") or data.get("version") or ""
        manage_url = data.get("ManageUrl") or data.get("manageUrl") or ""
        token_in_url = data.get("ManageTokenIncludedInUrl") or data.get("manageTokenIncludedInUrl") or False

        if not ext_id:
            raise SystemExit(0)

        details_url = f"https://www.vsixgallery.com/extension/{ext_id}"
        badge_md = f"[![Build status](https://www.vsixgallery.com/extensions/{urllib.parse.quote(ext_id)}/badge.svg)]({details_url})"

        lines = [f"## Published `{name}` {version}".rstrip(), ""]
        lines.append(f"- **Extension page:** {details_url}")
        if manage_url:
            if token_in_url:
                lines.append(f"- **Manage link (contains auto-generated token - save it):** {manage_url}")
            else:
                lines.append(f"- **Manage link:** {manage_url} (you'll be prompted for your manage token)")
        lines += ["", "### Badge", "", "```markdown", badge_md, "```", ""]

        with open(path, "a", encoding="utf-8", newline="\n") as f:
            f.write("\n".join(lines))
        PY
        fi
