name: "Publish to Open VSIX Gallery"
description: "Uploads a VSIX extension to the Open VSIX Gallery (vsixgallery.com)"

branding:
  icon: 'arrow-up-circle'
  color: 'purple'

inputs:
  vsix-file:
    description: "Path to the .vsix file to upload"
    required: true
  readme:
    description: "URL to a README.md. Defaults to <branch>/README.md in the current repo"
    required: false
  manage-token:
    description: |
      Optional manage token. Acts as a password for the extension's
      /extension/<id>/manage page (delete, etc.). When omitted, the gallery
      auto-generates a token on first upload and embeds it in the manage URL
      printed to the step log and the workflow run summary -- save it from
      there. When supplied, the manage URL will not contain the token; you'll
      be prompted for it on the manage page.
    required: false

runs:
  using: "composite"
  steps:
    - name: Upload to Open VSIX Gallery
      shell: bash
      env:
        VSIX_FILE: ${{ inputs.vsix-file }}
        README_URL: ${{ inputs.readme }}
        MANAGE_TOKEN: ${{ inputs.manage-token }}
      run: |
        if [ ! -f "$VSIX_FILE" ]; then
          echo "::error::VSIX file not found: $VSIX_FILE"
          exit 1
        fi

        repo="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/"
        readme="${README_URL:-${GITHUB_REF_NAME}/README.md}"

        # Force UTF-8 for all Python invocations so non-ASCII characters in
        # the summary don't blow up on Windows runners where stdout defaults
        # to cp1252 (UnicodeEncodeError on '\u2705', '\u2014', etc.).
        export PYTHONIOENCODING=utf-8
        export PYTHONUTF8=1

        encode() { python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$1"; }

        url="https://www.vsixgallery.com/api/upload?repo=$(encode "$repo")&issuetracker=$(encode "${repo}issues/")&readmeUrl=$(encode "$readme")"

        # Build curl args. Always mask the manage token in logs (whether the
        # publisher supplied one or the server generated one and returned it
        # in the manage URL).
        curl_args=(--silent --show-error --fail-with-body -F "file=@${VSIX_FILE}")

        if [ -n "$MANAGE_TOKEN" ]; then
          echo "::add-mask::$MANAGE_TOKEN"
          curl_args+=(-H "X-Manage-Token: $MANAGE_TOKEN")
        fi

        echo "Uploading $VSIX_FILE..."
        if ! result=$(curl "${curl_args[@]}" "$url" 2>&1); then
          echo "::error::Upload failed: $result"
          exit 1
        fi
        echo "Upload successful"

        # Parse the upload response once and reuse it for both the step log
        # and the workflow summary. We call python3 with stdin since the
        # response can contain arbitrary characters that aren't safe to pass
        # through env vars or argv on every shell.
        if command -v python3 >/dev/null 2>&1; then
          parsed=$(printf '%s' "$result" | python3 - <<'PY' || true
        import json
        import sys
        import urllib.parse

        try:
            data = json.load(sys.stdin)
        except Exception:
            sys.exit(0)

        ext_id = data.get("ID") or data.get("id") or ""
        if not ext_id:
            sys.exit(0)

        name = data.get("Name") or data.get("name") or ext_id
        version = data.get("Version") or data.get("version") or ""
        manage_url = data.get("ManageUrl") or data.get("manageUrl") or ""
        token_in_url = bool(data.get("ManageTokenIncludedInUrl") or data.get("manageTokenIncludedInUrl"))

        details_url = f"https://www.vsixgallery.com/extension/{ext_id}"
        # The gallery serves badges from /badge/<id>.svg (BadgeController).
        badge_url = f"https://www.vsixgallery.com/badge/{urllib.parse.quote(ext_id)}.svg"

        # One value per line. Bash reads it back via mapfile.
        for value in (ext_id, name, version, details_url, badge_url, manage_url, "1" if token_in_url else "0"):
            print(value)
        PY
          )

          if [ -n "$parsed" ]; then
            mapfile -t fields <<< "$parsed"
            ext_id="${fields[0]:-}"
            name="${fields[1]:-}"
            version="${fields[2]:-}"
            details_url="${fields[3]:-}"
            badge_url="${fields[4]:-}"
            manage_url="${fields[5]:-}"
            token_in_url="${fields[6]:-0}"

            # Echo the useful URLs into the step log so they show up in the
            # collapsed step output without having to open the run summary.
            echo ""
            echo "Published ${name} ${version}"
            echo "  Extension page: ${details_url}"
            if [ -n "$manage_url" ]; then
              if [ "$token_in_url" = "1" ]; then
                echo "  Manage link (contains auto-generated token - save it): ${manage_url}"
              else
                echo "  Manage link: ${manage_url}"
              fi
            fi

            # Best-effort run summary. Write directly to $GITHUB_STEP_SUMMARY
            # via an explicit UTF-8 file handle and never let a summary
            # failure fail the step.
            if [ -n "$GITHUB_STEP_SUMMARY" ]; then
              {
                echo "# Published ${name} ${version}"
                echo ""
                echo "[![Build status](${badge_url})](${details_url})"
                echo ""
                echo "<details><summary>Expand for details</summary>"
                echo ""
                echo "- **Extension page:** ${details_url}"
                if [ -n "$manage_url" ]; then
                  if [ "$token_in_url" = "1" ]; then
                    echo "- **Manage link (contains auto-generated token - save it):** ${manage_url}"
                  else
                    echo "- **Manage link:** ${manage_url} (you'll be prompted for your manage token)"
                  fi
                fi
                echo ""
                echo "</details>"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY" || true
            fi
          fi
        fi
